<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Setup Screen -->
        <div id="setup-screen" class="screen">
            <h1>Random Chat</h1>
            <div class="form-group">
                <label for="chatter-name">Your Name:</label>
                <input type="text" id="chatter-name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="group-size">Group Size:</label>
                <select id="group-size">
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </div>
            <button id="start-btn">Start Chat</button>
            <button id="cancel-btn" class="hidden">Cancel</button>
            <div id="setup-status" class="status-area"></div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen hidden">
            <div class="chat-header">
                <h2 id="chat-title">Chatting...</h2>
                <button id="leave-btn">Leave Chat</button>
            </div>
            <div id="chat-messages" class="message-area"></div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button id="send-btn">Send</button>
            </div>
            <div id="chat-status" class="status-area"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
