<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Random Chat · Group Matching</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <!-- Setup Screen -->
      <div id="setup-screen" class="screen setup-screen">
        <div class="card">
          <div class="logo">✨ Random Chat</div>
          <div class="form-group">
            <label>Your name</label>
            <input
              type="text"
              id="chatter-name"
              placeholder="e.g., Alex"
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label>Group size</label>
            <select id="group-size">
              <option value="2">2 people</option>
              <option value="3">3 people</option>
              <option value="4">4 people</option>
              <option value="5">5 people</option>
              <option value="6">6 people</option>
            </select>
          </div>
          <div class="button-group">
            <button id="start-btn" class="btn-primary">Start Chat</button>
            <a href="freedom_wall.html" class="btn-secondary"
              >📌 Freedom Wall</a
            >
          </div>
          <div id="setup-status" class="status-area"></div>
          <button id="cancel-btn" class="btn-cancel hidden">
            Cancel search
          </button>
        </div>
      </div>

      <!-- Chat Screen -->
      <div id="chat-screen" class="screen chat-screen hidden">
        <div class="chat-header">
          <div class="header-title">
            <span class="online-dot"></span>
            <h2 id="chat-title">Group chat</h2>
          </div>
          <button id="leave-btn" class="btn-leave">Leave</button>
        </div>
        <div id="chat-messages" class="message-area"></div>
        <div class="chat-input-wrapper">
          <textarea
            id="message-input"
            placeholder="Type a message..."
            rows="1"
          ></textarea>
          <button id="send-btn" class="btn-send">Send</button>
        </div>
        <div id="chat-status" class="status-area"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
