<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Freedom Wall – Drag & Drop Notes</title>
    <link rel="stylesheet" href="freedom.css" />
  </head>
  <body>
    <div class="board-container" id="board-container">
      <div id="board" class="board"></div>
    </div>

    <a href="index.html" class="back-link">🏠 Back to Home</a>

    <!-- Curtain form area -->
    <div class="curtain-wrapper">
      <div class="add-note" id="add-note">
        <h1>📌 Freedom Wall</h1>
        <input
          type="text"
          id="wall-username"
          placeholder="✨ Your name"
          maxlength="50"
          autocomplete="off"
        />
        <textarea
          id="wall-content"
          placeholder="Write your sticky note (max 300 chars)..."
          maxlength="300"
        ></textarea>
        <div class="char-counter"><span id="char-count">0</span>/300</div>
        <button id="post-note-btn">✚ Post Note</button>
        <div id="post-error" class="error"></div>
      </div>
    </div>
    <div class="pull-tab" id="pull-tab"></div>

    <div class="controls">
      <button class="zoom-btn" id="zoom-out">− Zoom</button>
      <span class="zoom-display" id="zoom-display">100%</span>
      <button class="zoom-btn" id="zoom-in">Zoom +</button>
    </div>

    <script src="freedom.js"></script>
  </body>
</html>
